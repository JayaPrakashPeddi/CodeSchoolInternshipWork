<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <div class="container">
    <form action="" method="">
        <div class="formContainer">
            <h1 style="margin: 0px; color: rgba(0, 0, 0, 0.659);">Login</h1>
            <label for="user" class="labels">UserID:</label>
            <input type="text" name="user" class="text-input" id="user" placeholder="UserID">
            <label for="password" class="labels">Password:</label>
            <input type="password" name="password" class="text-input" id="password" placeholder="Password">
            <div id="button-container">
            <input type="submit" value="Login" class="buttons">
            <button class="buttons" style="background-color: rgba(255, 153, 0, 0.655);">Cancel</button>
            </div>
            <span id="helper-message">New user?.<a href="#">Sign-up</a></span>
        </div>
    </form>
    </div>
</body>
</html>
