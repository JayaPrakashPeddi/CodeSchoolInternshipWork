<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Weather App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body class="d-flex flex-column min-vh-100 bg-dark">

  <div class="container text-center mt-5 flex-grow-1">

    <h1 class="mb-4 text-white">Weather App</h1>

    <!-- Search Bar -->
    <div class="row d-flex justify-content-center">
      <div class="col-12 col-md-8 col-xl-6 ">
        <div class="input-group mb-3 mx-auto">
          <input type="text" id="cityInput" class="form-control" placeholder="Enter city name...">
          <button class="btn btn-primary" onclick="getWeather()"><i class="bi bi-search"></i></button>
        </div>
      </div>
    </div>

    <!-- If Result -->
    <div id="weatherCard" class="card mx-auto p-3 shadow d-none" style="width: 300px;">
      <div class="d-flex justify-content-center align-items-center gap-1">
        <h3 id="city"></h3>
        <span class="" id="country"></span>
      </div>
      <p id="temp"></p>
      <p id="condition"></p>
      <p id="humidity"></p>
    </div>

    <!-- If No Result -->
    <div class="container d-none text-white" id="noResult">
      <h4>No City Found...</h4>
    </div>

  </div>
  
  <script src="script.js"></script>

</body>
</html>
