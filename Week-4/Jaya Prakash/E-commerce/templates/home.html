<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="../styles/style.css" />
    <title>Document</title>
  </head>

  <body id="logInBgImg" style="height: 100vh">
    <div class="container-fluid h-100">
      <div class="row h-100">
        <!-- left side bar -->

        <div
          class="col-2 h-100 position-fixed overflow-auto border d-none d-xl-flex flex-column z-2 bg-dark"
        >
          <div class="position-fixed mt-3 z-3">
            <img
              src="../assects/logo.png"
              height="50"
              width="200"
              class="navbar-brand"
              alt="logo.svg"
            />
          </div>
          <ul class="nav w-100" style="margin-top: 80px">
            <li class="nav-item w-100">
              <ul class="list-group list-group-flush mt-2">
                <li class="list-group-item border-0 bg-dark">
                  <a
                    href="./home.html"
                    class="nav-link text-dark rounded sideBarHover"
                    id="active"
                    ><span>Home</span></a
                  >
                </li>
                <li class="list-group-item border-0 bg-dark">
                  <a
                    href="./products.html"
                    class="nav-link text-white rounded sideBarHover"
                  >
                    <span>Products</span>
                  </a>
                </li>
                <li class="list-group-item border-0 bg-dark">
                  <a
                    href="./aboutus.html"
                    class="nav-link text-white rounded sideBarHover"
                  >
                    <span>About Us</span></a
                  >
                </li>
              </ul>
            </li>
          </ul>

          <div class="mt-auto w-100 text-center mb-3">
            <button class="btn btn-outline-danger px-5 py-1" onclick="logout()">
              Logout
            </button>
          </div>
        </div>

        <div class="offcanvas offcanvas-start text-bg-dark" id="sidebar">
          <div class="offcanvas-header">
            <img src="../assects/logo.png" height="40" />
            <button
              class="btn-close btn-close-white"
              data-bs-dismiss="offcanvas"
            ></button>
          </div>

          <div class="offcanvas-body d-flex flex-column">
            <ul class="nav w-100">
              <li class="nav-item w-100">
                <ul class="list-group list-group-flush mt-2">
                  <li class="list-group-item border-0 bg-dark">
                    <a
                      href="./home.html"
                      class="nav-link text-dark rounded sideBarHover"
                      id="active"
                      ><span>Home</span></a
                    >
                  </li>
                  <li class="list-group-item border-0 bg-dark">
                    <a
                      href="./products.html"
                      class="nav-link text-white rounded sideBarHover"
                    >
                      <span>Products</span>
                    </a>
                  </li>
                  <li class="list-group-item border-0 bg-dark">
                    <a
                      href="./aboutus.html"
                      class="nav-link text-white rounded sideBarHover"
                    >
                      <span>About Us</span></a
                    >
                  </li>
                </ul>
              </li>
            </ul>

            <div class="mt-auto text-center">
              <button class="btn btn-outline-danger w-100" onclick="logout()">
                Logout
              </button>
            </div>
          </div>
        </div>

        <!-- MAIN -->

        <div class="col-xl-10 h-100 p-0 lg-margin">
          <!-- top nav bar -->

          <nav
            class="navbar navbar-expand-lg navbar-light bg-dark border position-fixed top-0 end-0 navbar-lg-width z-1"
          >
            <div class="container d-flex justify-content-between">
              <div class="d-block d-xl-none">
                <i
                  class="bi bi-list text-white p-3 py-2 fs-4 rounded-circle icon-hover"
                  data-bs-toggle="offcanvas"
                  data-bs-target="#sidebar"
                ></i>
              </div>

              <!-- Logo -->
              <div class="d-block d-xl-none">
                <img
                  src="../assects/logo.png"
                  height="50"
                  width="200"
                  class="navbar-brand"
                  alt="logo.svg"
                />
              </div>
              <!-- search bar -->
              <div class="input-group d-none d-xl-flex" style="width: 600px">
                <input
                  type="text"
                  id="searchInput"
                  class="form-control"
                  placeholder="search..."
                />
                <button class="btn btn-secondary" onclick="searchItem()">
                  <i class="bi bi-search searchBtn"></i>
                </button>
              </div>
              <div></div>
              <div id="v-elipsis" class="d-flex d-xl-none">
                <i class="bi bi-three-dots-vertical text-white"></i>
              </div>

              <div class="nav d-none d-xl-flex">
                <a
                  href=""
                  class="nav-link d-flex justify-content-center align-items-center mt-1 rounded-circle icon-hover"
                >
                  <i class="bi bi-heart fs-4 text-white"></i>
                </a>
                <a
                  href="./cart.html"
                  class="nav-link d-flex justify-content-center align-items-center rounded-circle icon-hover"
                >
                  <i class="bi bi-cart2 fs-4 text-white"></i>
                </a>
                <div class="dropdown pt-1">
                  <button
                    class="btn d-flex align-items-center rounded-pill icon-hover dropdown-toggle"
                    data-bs-toggle="dropdown"
                    aria-expanded="false"
                  >
                    <i class="bi bi-person-circle fs-4 text-white"></i>
                    <span id="user" class="text-white ms-1 fs-5"></span>
                    <i class="bi bi-chevron-down fs-6 ms-1 text-white"></i>
                  </button>

                  <ul
                    class="dropdown-menu dropdown-menu-dark dropdown-menu-end"
                  >
                    <li><a class="dropdown-item" href="#">Profile</a></li>
                    <li><a class="dropdown-item" href="#">Settings</a></li>
                    <li><hr class="dropdown-divider" /></li>
                    <li>
                      <button
                        class="dropdown-item text-danger"
                        onclick="logout()"
                      >
                        Logout
                      </button>
                    </li>
                  </ul>
                </div>
              </div>
            </div>
          </nav>

          <!-- Body -->

          <div
            class="container-fluid d-flex align-items-center justify-content-center text-center"
            style="min-height: 80vh"
            id="mainDiv"
          >
            <div class="text-white">
              <h1 class="display-4 fw-bold mb-3">Welcome to Your Store 👋</h1>

              <p class="lead mb-4">
                Discover amazing products, great deals, and a seamless shopping
                experience.
              </p>

              <a class="btn btn-primary btn-lg px-4" href="./products.html">
                Explore Products
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="../script/default.js"></script>
  </body>
</html>
