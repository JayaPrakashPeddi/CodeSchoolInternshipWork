<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../styles/style.css" />
    <title>Shop</title>
  </head>
  <body
    class="min-vh-100 d-flex align-items-center justify-content-center"
    id="logInBgImg"
  >
    <div
      class="col-12 col-md-4 d-flex flex-column gap-3 p-4 rounded-4 border"
      id="loginDiv"
    >
      <h2 class="text-center text-white">Login</h2>
      <span
        id="invalidCreds"
        class="text-center text-danger d-none fw-bold fs-5"
        >Invalid Credentials</span
      >
      <div class="form-floating">
        <input
          type="text"
          name="userName"
          class="form-control"
          id="userName"
          placeholder="User Name"
        />
        <label for="userName">User Name</label>
        <span id="userNameError" class="text-danger d-none"
          >Invalid Username!!!</span
        >
      </div>
      <div class="form-floating">
        <input
          type="password"
          name="password"
          class="form-control"
          id="password"
          placeholder="Password"
        />
        <label for="password" class="text-center">Password</label>
        <span id="passwordError" class="text-danger d-none"
          >Invalid Password!!!</span
        >
      </div>
      <div class="d-flex justify-content-evenly mb-3">
        <button onclick="userAuth()" class="btn btn-primary px-5 py-2">
          Login
        </button>
        <a href="" class="btn btn-secondary px-5">Cancel</a>
      </div>
    </div>
    <script src="../script/script.js"></script>
  </body>
</html>
