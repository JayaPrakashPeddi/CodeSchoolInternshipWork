<!doctype html>
<html lang="en">
  <head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />

    <!-- Bootstrap CSS v5.2.1 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="../styles/styles.css" />
  </head>

  <body id="logInBgImg" class="min-vh-100">
    <div class="" id="navBar"></div>

    <div class="modal fade" id="recipeModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content bg-dark text-white">
          <div class="modal-body">
            <div class="row align-items-center mb-3">
              <div class="col-md-4">
                <img
                  src="https://cdn.dummyjson.com/recipe-images/1.webp"
                  alt=""
                  class="img-fluid rounded"
                  id="recipeImg"
                />
              </div>

              <div class="col-md-8">
                <h4 id="recipeTitle"></h4>
                <p style="color: red">
                  Ingredients:
                  <span id="recipeIngredients" style="color: white"></span>
                </p>
                <p style="color: red">
                  Preparation Time:
                  <span id="prepTimeMinutes" style="color: white"></span>
                </p>
                <p style="color: red">
                  Cooking Time:
                  <span id="cookTimeMinutes" style="color: white"></span>
                </p>
                <p style="color: red">
                  Cuisine:
                  <span id="cuisine" style="color: white"></span>
                </p>
                <p style="color: red">
                  Rating:
                  <span id="rating" style="color: white"></span>
                </p>
              </div>
            </div>
            <div class="row">
              <div class="col-10">
                <ul id="instructions"></ul>
              </div>
            </div>
            <div class="container-fluid text-center">
              <button
                class="btn btn-outline-danger px-4 py-2"
                data-bs-toggle="modal"
                data-bs-target="#recipeModal"
              >
                Close
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div
      class="offcanvas offcanvas-top bg-transparent d-flex align-items-center"
      style="height: 120px"
      id="searchBar"
    >
      <div class="input-group mt-auto" style="width: 80%">
        <input
          type="text"
          id="searchInput"
          placeholder="Search"
          class="form-control"
        />
        <button
          id="searchBtn"
          class="btn btn-primary text-white"
          data-bs-toggle="offcanvas"
          data-bs-target="#searchBar"
        >
          <i class="bi bi-search"></i>
        </button>
      </div>
    </div>
    <div
      style="padding-top: 85px"
      class="d-flex flex-column justify-content-center align-items-center gap-3 pb-3"
      id="parentDiv"
    >
      <button
        class="btn btn-primary border-white rounded-circle position-fixed z-2"
        style="bottom: 30px; right: 30px"
        data-bs-toggle="offcanvas"
        data-bs-target="#searchBar"
      >
        <label for="searchInput"><i class="bi bi-search fs-4"></i></label>
      </button>
    </div>
    <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
    <script src="../scripts/default.js"></script>
    <script src="../scripts/dashboard.js"></script>
    <!-- Bootstrap JavaScript Libraries -->
    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
      integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
      crossorigin="anonymous"
    ></script>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
      integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
