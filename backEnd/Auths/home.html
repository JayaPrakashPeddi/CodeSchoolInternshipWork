<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link
      rel="shortcut icon"
      href="https://web.telegram.org/a/favicon.svg"
      type="image/x-icon"
    />
    <title>Telegram</title>
    <link rel="stylesheet" href="./styles/style.css" />
  </head>

  <body class="vh-100">

    <!-- offcanvas for side bar -->


    
    <div class="container-fluid h-100">
      <div class="row h-100">
        <!-- SIDEBAR -->
        <div
          class="col-md-4 col-lg-3 border-end bg-light d-none d-md-flex flex-column p-0 position-fixed"
          id="sidebar"
          style="height: 100vh; overflow-y: auto"
        ></div>

        <!-- CHAT AREA -->
        <div
          class="col d-flex flex-column p-0 bg-telegram-pattern min-vh-100"
          id="chatBox"
        >
          <!-- Header -->
          <div
            class="border-bottom sticky-top bg-light p-1 d-flex justify-content-between align-items-center"
            style="min-height: 50px"
          >

          <!-- offcanvas button -->
        
        </div>

          <main></main>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script
      src="https://code.jquery.com/jquery-3.7.1.min.js"
      integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
      crossorigin="anonymous"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </body>
</html>
