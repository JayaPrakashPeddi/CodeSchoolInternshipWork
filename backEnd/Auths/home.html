<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <title>home</title>
    <link rel="stylesheet" href="./styles/styles.css" />
  </head>

  <body class="vh-100">
    <!-- offcanvas for side bar -->
    <div
      class="offcanvas offcanvas-start bg-black text-white border-end border-secondary"
      tabindex="-1"
      id="offcanvasMenu"
      style="width: 300px"
    >
      <!-- header -->
      <div class="offcanvas-header border-bottom border-secondary px-3 py-3">
        <!-- logo -->
        <div class="d-flex align-items-center gap-3">
          <div
            class="bg-primary d-flex align-items-center justify-content-center rounded-3"
            style="width: 45px; height: 45px"
          >
            <i class="bi bi-alarm text-white fs-4"></i>
          </div>

          <div>
            <h5 class="text-white mb-0 fw-bold">User Panel</h5>
            <small class="text-secondary">Dashboard</small>
          </div>
        </div>

        <!-- close btn -->
        <button
          type="button"
          class="btn-close btn-close-white"
          data-bs-dismiss="offcanvas"
          aria-label="Close"
        ></button>
      </div>

      <!-- offcanvas body -->
      <div class="offcanvas-body d-flex flex-column">
        <!-- navigation -->
        <ul class="navbar-nav d-flex flex-column gap-3 px-2">
          <li class="nav-item">
            <a
              href="#"
              class="nav-link darkmode-hover d-flex align-items-center gap-3 px-3 py-2 rounded-3 text-white fw-semibold active-link"
              id="offcanvasHomeLink"
              data-bs-dismiss="offcanvas"
              data-bs-target="#offcanvasMenu"
            >
              <i class="bi bi-house-door-fill fs-5"></i>
              <span>Home</span>
            </a>
          </li>

          <li class="nav-item">
            <a
              href="#"
              class="nav-link darkmode-hover d-flex align-items-center gap-3 px-3 py-2 rounded-3 text-white fw-semibold"
              id="offcanvasCategoriesLink"
              data-bs-dismiss="offcanvas"
              data-bs-target="#offcanvasMenu"
            >
              <i class="bi bi-grid-fill fs-5"></i>
              <span>Categories</span>
            </a>
          </li>

          <li class="nav-item">
            <a
              href="#"
              class="nav-link darkmode-hover d-flex align-items-center gap-3 px-3 py-2 rounded-3 text-white fw-semibold position-relative"
              id="offcanvasCartLink"
              data-bs-dismiss="offcanvas"
              data-bs-target="#offcanvasMenu"
            >
              <i class="bi bi-cart3 fs-5"></i>
              <span>Cart</span>
            </a>
          </li>

          <li class="nav-item">
            <a
              href="#"
              class="nav-link darkmode-hover d-flex align-items-center gap-3 px-3 py-2 rounded-3 text-white fw-semibold"
              id="offcanvasOrdersLink"
              data-bs-dismiss="offcanvas"
              data-bs-target="#offcanvasMenu"
            >
              <i class="bi bi-bag-check-fill fs-5"></i>
              <span>Orders</span>
            </a>
          </li>
        </ul>
      </div>
    </div>

    <div class="container-fluid h-100">
      <div class="row h-100">
        <!-- sidebar -->
        <div
          class="col-md-4 col-lg-3 border-end border-secondary bg-black d-none d-lg-flex flex-column p-0 position-fixed"
          id="sidebar"
          style="height: 100vh; overflow-y: auto"
        >
          <!-- logo -->
          <div class="d-flex align-items-center gap-3 p-3 border-secondary">
            <div
              class="bg-primary d-flex align-items-center justify-content-center rounded-3"
              style="width: 45px; height: 45px"
            >
              <i class="bi bi-alarm text-white fs-4"></i>
            </div>

            <div>
              <h5 class="text-white mb-0 fw-bold">User Panel</h5>
              <small class="text-secondary">Dashboard</small>
            </div>
          </div>

          <ul class="navbar-nav d-flex flex-column gap-3 w-100 mt-4 px-2">
            <li class="nav-item">
              <a
                href="#"
                class="nav-link darkmode-hover d-flex align-items-center gap-3 px-3 py-2 rounded-3 text-white fw-semibold transition-custom active-link"
                id="homeLink"
              >
                <i class="bi bi-house-door-fill fs-5"></i>
                <span>Home</span>
              </a>
            </li>

            <li class="nav-item">
              <a
                href="#"
                class="nav-link darkmode-hover d-flex align-items-center gap-3 px-3 py-2 rounded-3 text-white fw-semibold transition-custom"
                id="categoriesLink"
              >
                <i class="bi bi-grid-fill fs-5"></i>
                <span>Categories</span>
              </a>
            </li>

            <li class="nav-item">
              <a
                href="#"
                class="nav-link darkmode-hover d-flex align-items-center gap-3 px-3 py-2 rounded-3 text-white fw-semibold transition-custom position-relative"
                id="cartLink"
              >
                <i class="bi bi-cart3 fs-5"></i>
                <span>Cart</span>
                <!-- <span class="badge bg-danger rounded-pill ms-auto"> 3 </span> -->
              </a>
            </li>

            <li class="nav-item">
              <a
                href="#"
                class="nav-link darkmode-hover d-flex align-items-center gap-3 px-3 py-2 rounded-3 text-white fw-semibold transition-custom"
                id="ordersLink"
              >
                <i class="bi bi-bag-check-fill fs-5"></i>
                <span>Orders</span>
              </a>
            </li>
          </ul>
        </div>

        <!-- Right area -->
        <div class="col d-flex flex-column p-0 min-vh-100" id="right">
          <!-- header -->
          <div
            class="border-bottom border-secondary sticky-top bg-black p-3 d-flex justify-content-between justify-content-lg-end align-items-center"
            style="min-height: 50px"
          >
            <!-- offcanvas button -->
            <div
              class="d-lg-none"
              role="button"
              id="offcanvasMenuButton"
              data-bs-toggle="offcanvas"
              data-bs-target="#offcanvasMenu"
            >
              <i class="bi bi-list fs-4 text-white"></i>
            </div>
            <div>
              <button
                type="button"
                class="btn dropdown-toggle fs-5 text-white"
                data-bs-toggle="dropdown"
                aria-expanded="false"
                id="userDtlsDropDown"
              >
                <i class="bi bi-person-circle pe-1"></i>
                <span class="text-truncate" id="navbarUsername"></span>
              </button>
              <ul class="dropdown-menu dropdown-menu-end">
                <li id="settingsBtn">
                  <a class="dropdown-item" href="#">
                    <i class="bi bi-gear-fill"></i>
                    <span>Settings</span>
                  </a>
                </li>
                <li id="logoutBtn">
                  <a class="dropdown-item text-danger" href="#"
                    ><i class="bi bi-box-arrow-right pe-1"></i
                    ><span>Logout</span></a
                  >
                </li>
              </ul>
            </div>
          </div>

          <main id="mainContainer" class="p-3 text-white"></main>
        </div>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://code.jquery.com/jquery-3.7.1.min.js"
      integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
      crossorigin="anonymous"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="./scripts/home.js"></script>
  </body>
</html>
