<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <title>Telegram</title>
    <link rel="stylesheet" href="./styles/styles.css" />
  </head>

  <body class="vh-100">
    <!-- offcanvas for side bar -->
    <div
      class="offcanvas offcanvas-start text-dark"
      tabindex="-1"
      id="offcanvasMenu"
      style="width: 300px"
    >
      <div class="offcanvas-header d-flex justify-content-between">
        <h5 class="offcanvas-title fs-5 fw-bold" id="offcanvasScrollingLabel">
          E-Commerce
        </h5>
        <button
          type="button"
          class="btn-close text-reset"
          data-bs-dismiss="offcanvas"
          aria-label="Close"
        ></button>
      </div>
      <div class="offcanvas-body">
        <div
          class="dropdown d-flex justify-content-start align-items-center"
          id="offcanvasDropdown"
        ></div>

        <div
          class="d-flex justify-content-center align-items-center gap-2 ms-2"
          id="offcanvasloginAndRegisterLinks"
        >
          <a
            href="#"
            class="text-decoration-none nav-hover text-dark"
            data-bs-toggle="modal"
            data-bs-target="#loginModal"
            >login</a
          >/
          <a
            href="#"
            class="text-decoration-none nav-hover text-dark"
            data-bs-toggle="modal"
            data-bs-target="#registerModal"
            >register</a
          >
        </div>

        <div class="navbar navbar-expand mt-4">
          <ul class="navbar-nav d-flex flex-column align-items-baseline gap-4">
            <li class="navbar-item">
              <a
                href="#"
                class="navbar-link text-decoration-none text-dark"
                data-bs-dismiss="offcanvas"
                data-bs-target="#offcanvasMenu"
                id="offcanvasHomeLink"
                >Home</a
              >
            </li>
            <li class="navbar-item">
              <a
                href="#"
                class="navbar-link text-decoration-none text-dark"
                data-bs-dismiss="offcanvas"
                data-bs-target="#offcanvasMenu"
                id="offcanvasCategoriesLink"
                >--</a
              >
            </li>
            <li class="navbar-item">
              <a
                href="#"
                class="navbar-link text-decoration-none text-dark"
                data-bs-dismiss="offcanvas"
                data-bs-target="#offcanvasMenu"
                id="offcanvasCartLink"
                >--</a
              >
            </li>
            <li class="navbar-item">
              <a
                href="#"
                class="navbar-link text-decoration-none text-dark"
                data-bs-dismiss="offcanvas"
                data-bs-target="#offcanvasMenu"
                id="offcanvasOrdersLink"
                >--</a
              >
            </li>
          </ul>
        </div>
      </div>
    </div>

    <div class="container-fluid h-100">
      <div class="row h-100">
        <!-- SIDEBAR -->
        <div
          class="col-md-4 col-lg-3 border-end bg-dark d-none d-lg-flex flex-column p-0 position-fixed"
          id="sidebar"
          style="height: 100vh; overflow-y: auto"
        ></div>

        <!-- CHAT AREA -->
        <div class="col d-flex flex-column p-0 min-vh-100" id="right">
          <!-- Header -->
          <div
            class="border-bottom sticky-top bg-dark p-1 px-3 d-flex justify-content-between justify-content-lg-end align-items-center"
            style="min-height: 50px"
          >
            <!-- offcanvas button -->
            <div
              class="fs-5 d-lg-none"
              role="button"
              id="offcanvasMenuButton"
              data-bs-toggle="offcanvas"
              data-bs-target="#offcanvasMenu"
            >
              <i class="bi bi-list fs-5 text-light"></i>
            </div>
            <div>
              <button
                type="button"
                class="btn dropdown-toggle fs-5 text-white"
                data-bs-toggle="dropdown"
                aria-expanded="false"
                id="userDtlsDropDown"
              >
                <i class="bi bi-person-circle pe-1"></i>
                <span class="" id="navbarUsername"></span>
              </button>
              <ul class="dropdown-menu dropdown-menu-end bg-black">
                <li>
                  <a class="dropdown-item text-white dark-dropdown" href="#"
                    ><i class="bi bi-pencil-square pe-1"></i>Profile</a
                  >
                </li>

                <li id="logoutBtn">
                  <a class="dropdown-item text-danger" href="#"
                    ><i class="bi bi-box-arrow-right pe-1"></i>Logout</a
                  >
                </li>
              </ul>
            </div>
          </div>

          <main></main>
        </div>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://code.jquery.com/jquery-3.7.1.min.js"
      integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
      crossorigin="anonymous"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="./scripts/home.js"></script>
  </body>
</html>
