<div class="col-md-6 col-lg-5" id="verifyEmail">
  <div class="card rounded-4 shadow-lg border-0">
    <div class="card-body p-4">
      <div class="d-flex justify-content-between align-items-center mb-1">
        <div class="fs-5 fw-bold">Verify</div>
        <button class="btn btn-sm btn-white" id="cancleVerifyEmail">
          <i class="bi bi-x fs-4"></i>
        </button>
      </div>
      <div class="mb-3">
        <label class="form-label" for="validateEmailInput">Email</label>
        <div class="input-group">
          <input
            type="email"
            id="validateEmailInput"
            class="form-control"
            placeholder="Enter your email"
            required
          />
          <button class="btn btn-dark" id="getOTPbtn">Get OTP</button>
        </div>
        <small class="text-danger d-none" id="validateEmailInputError"
          >Invalid email!!!</small
        >
      </div>
      <div class="mb-3 d-none" id="otpInputField">
        <label class="form-label" for="otpInput">Enter OTP</label>
        <input
          type="text"
          id="otpInput"
          class="form-control"
          maxlength="6"
          placeholder="XXX-XXX"
          required
        />
        <small class="text-danger d-none" id="otpInputFieldError"
          >Invalid OTP!!!</small
        >
        <small class="text-muted" id="resendOtpContainer"
          ><span class="mx-2" id="timerText"></span
          ><span class="hoverEffect text-dark" id="resendOtp"
            >Resend</span
          ></small
        >
      </div>

      <button class="btn btn-dark w-100" id="verifyBtn" disabled>Verify</button>

      <div id="passwordResetContainer" class="d-none">
        <div class="mb-3">
          <label class="form-label" for="newPasswordInput">New Password</label>
          <input
            type="password"
            id="newPasswordInput"
            class="form-control"
            placeholder="Setup New Password"
            required
          />
          <small class="text-danger d-none" id="newPasswordInputError"
            >Must be in between 6 - 25 characters!!!</small
          >
        </div>
        <div class="mb-3">
          <label class="form-label" for="confirmPasswordInput"
            >Confirm Password</label
          >
          <input
            type="password"
            id="confirmPasswordInput"
            class="form-control"
            placeholder="Confirm Password"
            required
          />
          <small class="text-danger d-none" id="confirmPasswordInputError"
            >Password Missmatch!!!</small
          >
        </div>
        <button class="btn btn-success w-100" id="resetPasswordBtn">
          Confirm
        </button>
      </div>
    </div>
  </div>
</div>
