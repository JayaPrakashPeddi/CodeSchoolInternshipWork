<div class="col-md-6 col-lg-5" id="loginContainer">
  <div class="card rounded-4 shadow-lg border-0">
    <div class="card-body p-4">
      <h2 class="text-center fw-bold mb-4">Login</h2>

      <div class="mb-3">
        <label class="form-label" for="emailInput">Email</label>
        <input
          type="email"
          id="emailInput"
          class="form-control"
          placeholder="Enter your email"
          required
        />
        <small class="text-danger d-none" id="emailInputError"
          >Invalid email!!!</small
        >
      </div>

      <div class="mb-3">
        <label class="form-label" for="passwordInput">Password</label>
        <input
          type="password"
          id="passwordInput"
          class="form-control"
          placeholder="Enter your password"
          required
        />
        <small class="text-danger d-none" id="passwordInputError"
          >Invalid Password!!!</small
        >
      </div>

      <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" id="remember" />
        <label class="form-check-label" for="remember"> Remember me </label>
      </div>

      <button class="btn btn-dark w-100" id="loginBtn">Login</button>

      <div class="text-center mt-3">
        <span class="text-decoration-none" id="forgotPasswordLink"> Forgot password? </span>
      </div>

      <p class="text-center mt-3 mb-0">
        Don't have an account?
        <span class="text-decoration-none" id="registerLink">Register</span>
      </p>
    </div>
  </div>
</div>
