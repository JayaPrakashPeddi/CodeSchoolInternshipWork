<div class="col-md-8 col-lg-6" id="registerContainer">
  <div class="card rounded-4 shadow-lg border-0">
    <form class="card-body p-4" id="registerForm">
      <h2 class="text-center fw-bold mb-4">Register</h2>

      <div class="row justify-content-center align-items-center">
        <div class="col-6 mb-3 text-center">
          <img
            src="../assects/images.png"
            class="rounded-circle border"
            id="profileImagePreview"
            height="100"
            width="100"
            alt=""
          />
          <input
            type="file"
            accept="image/*"
            id="profileImage"
            name="profileImage"
            hidden
          />
          <!-- <div
            class="position-absolute bg-dark text-center rounded-circle px-2 py-1"
            id="uploadImageIcon"
            style="top: 60px; right: 100px"
          >
            <i class="bi bi-pen text-white"></i>
          </div> -->
        </div>
      </div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label" for="firstNameInput">First Name</label>
          <input
            type="text"
            id="firstNameInput"
            name="firstNameInput"
            class="form-control"
            placeholder="Enter your First name"
            required
          />
          <small class="text-danger d-none" id="firstNameInputError"
            >Invalid first name!!!</small
          >
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label" for="lastNameInput">Last Name</label>
          <input
            type="text"
            id="lastNameInput"
            name="lastNameInput"
            class="form-control"
            placeholder="Enter your Last name"
            required
          />
          <small class="text-danger d-none" id="lastNameInputError"
            >Invalid last name!!!</small
          >
        </div>
      </div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label" for="registerEmailInput">Email</label>
          <input
            type="email"
            id="registerEmailInput"
            name="registerEmailInput"
            class="form-control"
            placeholder="Enter your email"
            required
          />
          <small class="text-danger d-none" id="registerEmailInputError"
            >Invalid email!!!</small
          >
          <small class="text-danger d-none" id="registerEmailExist"
            ></small
          >
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label" for="registerPhoneInput">Phone</label>
          <input
            type="text"
            maxlength="10"
            id="registerPhoneInput"
            name="registerPhoneInput"
            class="form-control"
            placeholder="Enter your phone number"
            required
          />
          <small class="text-danger d-none" id="registerPhoneInputError"
            >Invalid phone number!!!</small
          >
          <small class="text-danger d-none" id="registerPhoneExist"
            ></small
          >
        </div>
      </div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label" for="registerPasswordInput">Password</label>
          <input
            type="password"
            class="form-control"
            id="registerPasswordInput"
            name="registerPasswordInput"
            placeholder="Enter your password"
            required
          />
          <small class="text-danger d-none" id="registerPasswordInputError"
            >Invalid password!!!</small
          >
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label" for="registerConfirmPasswordInput"
            >Confirm Password</label
          >
          <input
            type="password"
            class="form-control"
            id="registerConfirmPasswordInput"
            name="registerConfirmPasswordInput"
            placeholder="Enter your confirm password"
            required
          />
          <small
            class="text-danger d-none"
            id="registerConfirmPasswordInputError"
            >Password Missmatch!!!</small
          >
        </div>
      </div>
      <button class="btn btn-dark w-100" id="registerBtn">Register</button>
      <p class="text-center mt-3 mb-0">
        Already have an account?
        <span class="text-decoration-none" id="loginLink">Login</span>
      </p>
    </form>
  </div>
</div>
