<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <title>Telegram</title>
    <link rel="stylesheet" href="./styles/style.css" />
  </head>

  <body class="vh-100 overflow-hidden">
    <div class="container-fluid h-100">
      <div class="row h-100">
        <!-- 🔹 SIDEBAR -->
        <div
          class="col-12 col-md-4 col-lg-3 border-end bg-white d-flex flex-column p-0"
        >
          <!-- Top Bar -->
          <div class="p-2 border-bottom d-flex align-items-center gap-2">
            <div class="dropdown">
              <button
                class="btn btn-light px-1"
                data-bs-toggle="dropdown"
                aria-expanded="false"
              >
                <i class="bi bi-list fs-3"></i>
              </button>

              <ul class="dropdown-menu dropdown-menu border-0 p-2 shadow">
                <!-- Profile -->
                <li class="border-bottom pb-2 mb-2">
                  <a
                    class="dropdown-item d-flex align-items-center gap-2"
                    href="#"
                  >
                    <img
                      src="./assects/placeholderImg.jpg"
                      width="30"
                      height="30"
                      id="userProfile"
                      class="rounded-circle"
                    />
                    <span class="fw-medium" id="userName">John Doe</span>
                  </a>
                </li>

                <!-- Items -->
                <li>
                  <a
                    class="dropdown-item d-flex align-items-center gap-2"
                    href="#"
                  >
                    <i class="bi bi-person"></i>
                    <span>My Profile</span>
                  </a>
                </li>

                <li>
                  <a
                    class="dropdown-item d-flex align-items-center gap-2"
                    href="#"
                  >
                    <i class="bi bi-bookmark"></i>
                    <span>Saved Messages</span>
                  </a>
                </li>

                <li>
                  <a
                    class="dropdown-item d-flex align-items-center gap-2"
                    href="#"
                  >
                    <i class="bi bi-people"></i>
                    <span>Contacts</span>
                  </a>
                </li>

                <li>
                  <a
                    class="dropdown-item d-flex align-items-center gap-2"
                    href="#"
                  >
                    <i class="bi bi-gear"></i>
                    <span>Settings</span>
                  </a>
                </li>

                <!-- Logout -->
                <li class="border-top mt-2 pt-2">
                  <a
                    class="dropdown-item d-flex align-items-center gap-2 text-danger"
                    id="logoutBtn"
                    href="#"
                  >
                    <i class="bi bi-box-arrow-right"></i>
                    <span>Logout</span>
                  </a>
                </li>
              </ul>
            </div>

            <div class="w-100 position-relative">
              <i
                class="bi bi-search text-dark fs-5 position-absolute"
                style="left: 15px; top: 5px"
              ></i
              ><input
                type="text"
                class="form-control rounded-pill text-dark border-0 ps-5"
                placeholder="Search..."
                style="height: 40px; background-color: rgb(234, 233, 233);"
              />
            </div>
          </div>

          <!-- Contacts -->
          <div class="flex-grow-1 overflow-auto">
            <!-- Contact -->
            <div
              class="d-flex align-items-center gap-2 p-2 active-contact rounded-2"
            >
              <img
                src="./assects/placeholderImg.jpg"
                height="50"
                width="50"
                class="rounded-circle"
              />
              <div class="flex-grow-1">
                <div class="fw-semibold">John</div>
                <small class="text-muted text-truncate d-block"
                  >Hey bro...</small
                >
              </div>
              <small class="text-muted">12:30</small>
            </div>

            <div class="d-flex align-items-center gap-2 p-2 contact">
              <img
                src="./assects/placeholderImg.jpg"
                height="50"
                width="50"
                class="rounded-circle"
              />
              <div class="flex-grow-1">
                <div class="fw-semibold">Alice</div>
                <small class="text-muted text-truncate d-block"
                  >Typing...</small
                >
              </div>
              <small class="text-muted">11:10</small>
            </div>
          </div>
        </div>

        <!-- 🔹 CHAT AREA -->
        <div class="col d-md-flex flex-column bg-telegram-pattern d-none">
          <!-- Header -->
          <div
            class="border-bottom bg-white p-2 d-flex justify-content-between align-items-center"
          >
            <div class="d-flex align-items-center gap-2">
              <img
                src="./assects/placeholderImg.jpg"
                height="50"
                width="50"
                class="rounded-circle"
              />
              <div>
                <div class="fw-semibold">John</div>
                <small class="text-muted">online</small>
              </div>
            </div>

            <div class="d-flex gap-3">
              <i class="bi bi-search"></i>
              <i class="bi bi-telephone"></i>
              <i class="bi bi-three-dots-vertical"></i>
            </div>
          </div>

          <!-- Messages -->
          <div
            id="chatArea"
            class="flex-grow-1 overflow-auto px-3 py-2 d-flex flex-column gap-2"
          >
            <!-- Received -->
            <div class="d-flex">
              <div class="msg received">
                Hello bro 👋
                <span class="msg-time">12:30</span>
              </div>
            </div>

            <!-- Sent -->
            <div class="d-flex justify-content-end">
              <div class="msg sent">
                Looks clean 🔥
                <span class="msg-time">12:31 ✓✓</span>
              </div>
            </div>

            <!-- Image -->
            <div class="d-flex">
              <div class="msg received p-1">
                <img
                  src="./assects/placeholderImg.jpg"
                  height="400"
                  width="300"
                  class="img-fluid rounded-3"
                />
                <span class="msg-time">12:32</span>
              </div>
            </div>
          </div>

          <!-- Input -->
          <form class="border-top p-2">
            <div class="input-group">
              <button class="btn btn-light border-0">
                <i class="bi bi-emoji-smile"></i>
              </button>

              <textarea
                class="form-control border-0"
                rows="1"
                placeholder="Message..."
                style="resize: none; max-height: 120px"
              ></textarea>

              <button type="button" class="btn btn-light border-0">
                <i class="bi bi-paperclip"></i>
              </button>

              <button class="btn btn-primary rounded-circle ms-2">
                <i class="bi bi-send"></i>
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script
      src="https://code.jquery.com/jquery-3.7.1.min.js"
      integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
      crossorigin="anonymous"
    ></script>
    <script src="./scripts/home.js"></script>
  </body>
</html>
