<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link
      rel="shortcut icon"
      href="https://web.telegram.org/a/favicon.svg"
      type="image/x-icon"
    />
    <title>Telegram</title>
    <link rel="stylesheet" href="./styles/style.css" />
  </head>

  <body class="vh-100">
    <!-- offcanvas -->
    <div
      class="offcanvas offcanvas-start"
      tabindex="-1"
      id="offcanvasExample"
      aria-labelledby="offcanvasExampleLabel"
    >
      <div class="offcanvas-header d-flex justify-content-between p-4">
        <h5 class="offcanvas-title" id="offcanvasExampleLabel">
          Notifications
        </h5>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="offcanvas"
          aria-label="Close"
        ></button>
      </div>
      <hr class="border border-dark" />
      <div class="offcanvas-body" id="notificationPanal">
        <div class="text-center w-100 p-4">No notifications...</div>
      </div>
    </div>

    <div class="container-fluid h-100">
      <div class="row h-100">
        <!-- SIDEBAR -->
        <div
          class="col-12 col-md-4 col-lg-3 border-end bg-light d-flex flex-column p-0 position-fixed min-vh-100"
        >
          <!-- Top Bar -->
          <div
            class="p-2 border-bottom bg-light d-flex align-items-center gap-2 sticky-top"
          >
            <div class="dropdown">
              <button
                class="btn btn-light px-1"
                data-bs-toggle="dropdown"
                aria-expanded="false"
              >
                <i class="bi bi-list fs-3"></i>
              </button>

              <ul class="dropdown-menu dropdown-menu border-0 p-2 shadow">
                <!-- Profile -->
                <li class="border-bottom pb-2 mb-2">
                  <a
                    class="dropdown-item d-flex align-items-center gap-2"
                    href="#"
                  >
                    <img
                      src="./assects/placeholderImg.jpg"
                      width="30"
                      height="30"
                      id="userProfile"
                      class="rounded-circle"
                    />
                    <span class="fw-medium" id="userName">John Doe</span>
                  </a>
                </li>

                <!-- Items -->
                <li>
                  <a
                    class="dropdown-item d-flex align-items-center gap-2"
                    href="#"
                  >
                    <i class="bi bi-bookmark"></i>
                    <span>Saved Messages</span>
                  </a>
                </li>

                <li>
                  <a
                    class="dropdown-item d-flex align-items-center gap-2"
                    href="#"
                  >
                    <i class="bi bi-people"></i>
                    <span>Contacts</span>
                  </a>
                </li>

                <li>
                  <a
                    class="dropdown-item d-flex align-items-center gap-2"
                    href="#"
                  >
                    <i class="bi bi-gear"></i>
                    <span>Settings</span>
                  </a>
                </li>

                <!-- Logout -->
                <li class="border-top mt-2 pt-2">
                  <a
                    class="dropdown-item d-flex align-items-center gap-2 text-danger"
                    id="logoutBtn"
                    href="#"
                  >
                    <i class="bi bi-box-arrow-right"></i>
                    <span>Logout</span>
                  </a>
                </li>
              </ul>
            </div>

            <div class="w-100 position-relative">
              <i
                class="bi bi-search text-dark fs-5 position-absolute"
                style="left: 15px; top: 5px"
              ></i
              ><input
                type="text"
                id="searchContacts"
                class="form-control rounded-pill text-dark border-0 px-5"
                placeholder="Search..."
                style="height: 40px; background-color: rgb(234, 233, 233)"
              />
              <i
                class="bi bi-x text-dark fs-4 position-absolute d-none"
                id="cancelSearch"
                style="right: 15px; top: 0px"
              ></i>
            </div>

            <div class="position-relative">
              <i
                class="bi bi-bell fs-5 px-2 p-1 onHover rounded-circle"
                type="button"
                data-bs-toggle="offcanvas"
                data-bs-target="#offcanvasExample"
                aria-controls="offcanvasExample"
              ></i
              ><span
                class="position-absolute bg-danger p-1 rounded-circle d-none"
                id="notificationsPopupIcon"
                style="right: 3px; top: 1px"
              ></span>
            </div>
          </div>

          <!-- Contacts -->
          <div class="flex-grow-1 overflow-auto" id="contactsContainer">
            <!-- Contact -->
          </div>
        </div>

        <!-- CHAT AREA -->
        <div
          class="col d-md-flex flex-column bg-telegram-pattern d-none"
          id="chatBox"
        ></div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script
      src="https://code.jquery.com/jquery-3.7.1.min.js"
      integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
      crossorigin="anonymous"
    ></script>
    <script src="./scripts/home.js"></script>
  </body>
</html>
