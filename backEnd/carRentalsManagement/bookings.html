<div
  class="container-fluid d-flex flex-column align-items-center text-center"
  style="min-height: 80vh; margin-top: 85px"
>
  <div class="modal fade" id="bookingDetailsModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-xl">
      <div class="modal-content rounded-4 shadow">
        <div class="modal-header border-0">
          <h5 class="modal-title fw-bold">Booking Details</h5>
          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="modal"
          ></button>
        </div>

        <div class="modal-body">
          <div class="row g-4 align-items-start">
            <div class="col-md-6 text-center">
              <img
                id="bImage"
                class="img-fluid rounded-3"
                style="max-height: 320px; object-fit: cover"
              />
            </div>

            <div class="col-md-6">
              <div class="row">
                <div class="col-6">
                  <div class="mb-3">
                    <span class="text-muted">Driver Name:</span><br />
                    <span id="bDriverName" class="fw-semibold fs-5"></span>
                  </div>
                </div>
                <div class="col-6">
                  <div class="mb-3">
                    <span class="text-muted">License Number:</span><br />
                    <span id="bLicenseNumber" class="fw-semibold fs-5"></span>
                  </div>
                </div>
              </div>

              <div class="row">
                <div class="col-6">
                  <div class="mb-3">
                    <span class="text-muted">Vehicle Name</span>
                    <div id="bVehicleName" class="fw-semibold fs-5"></div>
                  </div>
                </div>
                <div class="col-6">
                  <div class="mb-3">
                    <span class="text-muted">Vehicle Number</span>
                    <div id="bNumber" class="fw-semibold fs-5"></div>
                  </div>
                </div>
              </div>

              <div class="row">
                <div class="col-6">
                  <div class="mb-3">
                    <span class="text-muted">Start Date:</span>
                    <div id="bStartDate" class="fw-semibold fs-5"></div>
                  </div>
                </div>
                <div class="col-6">
                  <div class="mb-3">
                    <span class="text-muted">End Date:</span>
                    <div id="bEndDate" class="fw-semibold fs-5"></div>
                  </div>
                </div>
              </div>

              <div class="row">
                <div class="col-6">
                  <div class="mb-3">
                    <span class="text-muted">Price Per Day:</span><br />
                    <span
                      id="bPricePerDay"
                      class="fw-bold text-success fs-6"
                    ></span>
                  </div>
                </div>
                <div class="col-6">
                  <div class="mb-3">
                    <span class="text-muted">Total Price:</span><br />
                    <span
                      id="bTotalPrice"
                      class="fw-bold text-success fs-6"
                    ></span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="table-responsive w-100">
    <table class="table table-dark table-striped table-hover align-middle">
      <thead class="table-secondary text-dark">
        <tr id="tableHead">
          <th>#</th>
          <th>Driver Id</th>
          <th>Vehicle Id</th>
          <th>Booked Date</th>
          <th>Return Date</th>
          <th>Total Amount</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody id="bookingsTable">
        <td colspan="7">No Bookings made...</td>
      </tbody>
    </table>
  </div>
</div>
