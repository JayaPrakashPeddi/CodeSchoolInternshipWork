      <div
        class="row border w-75 rounded-4 my-4 bg-lowOpacity boxToLeft"
        id="registerContainer"
        style="min-height: 80vh"
      >
        <div class="col py-4">
          <h2 class="text-center text-white mb-4">Register</h2>
          <form
            method="post"
            class="container d-flex flex-column w-100 w-lg-75 gap-4"
          >
            <div class="d-flex flex-column gap-4">
              <div class="row gap-4 gap-md-0">
                <div class="col-md-6">
                  <div class="form-floating">
                    <input
                      type="text"
                      name="firstName"
                      class="form-control"
                      id="firstName"
                      placeholder="First Name"
                      value="Jaya Prakash"
                      required
                    />
                    <label for="firstName" class="text-center"
                      >First Name</label
                    >
                    <span id="firstNameError" class="text-danger d-none"
                      >Invalid First Name!!!</span
                    >
                  </div>
                </div>

                <div class="col-md-6">
                  <div class="form-floating">
                    <input
                      type="text"
                      name="lastName"
                      class="form-control"
                      id="lastName"
                      placeholder="Last Name"
                      value="Peddi"
                      required
                    />
                    <label for="lastName">Last Name</label>
                    <span id="lastNameError" class="text-danger d-none"
                      >Invalid Name!!!</span
                    >
                  </div>
                </div>
              </div>

              <div class="row gap-4 gap-md-0">
                <div class="col-md-6">
                  <div class="form-floating">
                    <input
                      type="text"
                      name="email"
                      class="form-control"
                      id="email"
                      placeholder="Email"
                      value="jp@gmail.com"
                      required
                    />
                    <label for="email">Email</label>
                    <span id="emailError" class="text-danger d-none"
                      >Invalid Email!!!</span
                    >
                  </div>
                </div>

                <div class="col-md-6">
                  <div class="form-floating">
                    <input
                      type="tel"
                      name="phone"
                      class="form-control"
                      id="phone"
                      placeholder="Phone Number"
                      pattern="[0-9]{10}"
                      value="1234567890"
                      required
                    />
                    <label for="phone">Phone Number</label>
                    <span id="phoneError" class="text-danger d-none"
                      >Invalid phone number!!!</span
                    >
                  </div>
                </div>
              </div>

              <div class="row gap-4 gap-md-0">
                <div class="col-md-6">
                  <div class="form-floating">
                    <input
                      type="text"
                      name="panNumber"
                      class="form-control"
                      id="panNumber"
                      placeholder="PAN Number"
                      value="ABCDE1234F"
                      required
                    />
                    <label for="panNumber">PAN Number</label>
                    <span id="panNumberError" class="text-danger d-none"
                      >Invalid PAN ID!!!</span
                    >
                  </div>
                </div>

                <div class="col-md-6">
                  <div class="form-floating">
                    <input
                      type="text"
                      name="licenseNumber"
                      class="form-control"
                      id="licenseNumber"
                      placeholder="License Number"
                      value="KA01 20100012345"
                      required
                    />
                    <label for="licenseNumber">License Number</label>
                    <span id="licenseNumberError" class="text-danger d-none"
                      >Invalid License Number!!!</span
                    >
                  </div>
                </div>
              </div>

              <div class="row gap-4 gap-md-0">
                <div class="col">
                  <div class="form-floating">
                    <input
                      type="date"
                      name="dob"
                      class="form-control"
                      id="dob"
                      placeholder="Date of Birth"
                      required
                    />
                    <label for="dob">Date of birth</label>
                    <span id="dobError" class="text-danger d-none"
                      >Invalid Date of birth!!!</span
                    >
                  </div>
                </div>

                <div class="col">
                  <div class="form-floating">
                    <input
                      type="number"
                      name="aadhar"
                      class="form-control"
                      id="aadhar"
                      placeholder="Aaadhar Number"
                      required
                    />
                    <label for="aadhar">Aaadhar Number</label>
                    <span id="aadharError" class="text-danger d-none"
                      >Aaadhar Number must be 12 digits!!!</span
                    >
                  </div>
                </div>
              </div>

              <div class="row gap-4 gap-md-0">
                <div class="col-md-6 form-floating">
                  <div class="form-floating">
                    <input
                      type="password"
                      name="password"
                      class="form-control"
                      id="password"
                      placeholder="Password"
                      value="1234567890"
                      required
                    />
                    <label for="password" class="text-center">Password</label>
                    <span id="passwordError" class="text-danger d-none"
                      >Invalid Password!!!</span
                    >
                  </div>
                </div>

                <div class="col-md-6 form-floating">
                  <div class="form-floating">
                    <input
                      type="password"
                      name="conformPassword"
                      class="form-control"
                      id="conformPassword"
                      placeholder="Conform-Password"
                      value="1234567890"
                      required
                    />
                    <label for="conformPassword" class="text-center"
                      >Conform-Password</label
                    >
                    <span id="conformPasswordError" class="text-danger d-none"
                      >Password Missmatch!!!</span
                    >
                  </div>
                </div>
              </div>
            </div>
            <div class="d-flex justify-content-evenly">
              <button
                onclick=""
                class="btn btn-primary w-100 py-2"
                id="registerBtn"
              >
                <span id="btnText">Submit</span>
                <div
                  class="spinner-border spinner-border-sm d-none"
                  role="status"
                  id="spinner"
                >
                  <span class="visually-hidden">Loading...</span>
                </div>
              </button>
            </div>
          </form>
          <hr class="border-1 border-white" />
          <p class="text-center text-white text-wrap">
            Already have an account?
            <a href="#" id="loginLink" class="text-decoration-none">login</a>
          </p>
        </div>
      </div>
