<div
  class="container-fluid d-flex flex-column align-items-center text-center"
  style="min-height: 80vh; margin-top: 85px"
>
  <div class="w-100 d-flex justify-content-end mb-2">
    <button
      class="btn btn-info"
      data-bs-toggle="offcanvas"
      data-bs-target="#addUserCanvas"
    >
      <i class="bi bi-plus-circle"></i> Add New User
    </button>
  </div>
  <!-- Offcanvas -->
  <div
    class="offcanvas offcanvas-end bg-dark text-light"
    tabindex="-1"
    id="addUserCanvas"
  >
    <div class="offcanvas-header">
      <h5 class="offcanvas-title">Register User</h5>
      <button
        type="button"
        class="btn-close btn-close-white"
        data-bs-dismiss="offcanvas"
      ></button>
    </div>

    <div class="offcanvas-body">
      <form id="registerForm" class="d-flex flex-column gap-3">
        <!-- First + Last -->
        <div class="row g-2">
          <div class="col-md-6">
            <div class="form-floating">
              <input
                type="text"
                id="firstName"
                class="form-control"
                placeholder="First Name"
              />
              <label>First Name</label>
            </div>
            <span id="firstNameError" class="text-danger small d-none"
              >Invalid First Name</span
            >
          </div>

          <div class="col-md-6">
            <div class="form-floating">
              <input
                type="text"
                id="lastName"
                class="form-control"
                placeholder="Last Name"
              />
              <label>Last Name</label>
            </div>
            <span id="lastNameError" class="text-danger small d-none"
              >Invalid Last Name</span
            >
          </div>
        </div>

        <!-- Email + Phone -->
        <div class="row g-2">
          <div class="col-md-6">
            <div class="form-floating">
              <input
                type="email"
                id="email"
                class="form-control"
                placeholder="Email"
              />
              <label>Email</label>
            </div>
            <span id="emailError" class="text-danger small d-none"
              >Invalid Email</span
            >
          </div>

          <div class="col-md-6">
            <div class="form-floating">
              <input
                type="tel"
                id="phone"
                class="form-control"
                placeholder="Phone"
              />
              <label>Phone</label>
            </div>
            <span id="phoneError" class="text-danger small d-none"
              >Invalid Phone</span
            >
          </div>
        </div>

        <!-- PAN + License -->
        <div class="row g-2">
          <div class="col-md-6">
            <div class="form-floating">
              <input
                type="text"
                id="panNumber"
                class="form-control"
                placeholder="PAN"
              />
              <label>PAN Number</label>
            </div>
            <span id="panNumberError" class="text-danger small d-none"
              >Invalid PAN</span
            >
          </div>

          <div class="col-md-6">
            <div class="form-floating">
              <input
                type="text"
                id="licenseNumber"
                class="form-control"
                placeholder="License"
              />
              <label>License Number</label>
            </div>
            <span id="licenseNumberError" class="text-danger small d-none"
              >Invalid License</span
            >
          </div>
        </div>

        <!-- DOB + Aadhar -->
        <div class="row g-2">
          <div class="col-md-6">
            <div class="form-floating">
              <input type="date" id="dob" class="form-control" />
              <label>Date of Birth</label>
            </div>
            <span id="dobError" class="text-danger small d-none"
              >Invalid DOB</span
            >
          </div>

          <div class="col-md-6">
            <div class="form-floating">
              <input
                type="text"
                id="aadhar"
                class="form-control"
                placeholder="Aadhar"
              />
              <label>Aadhar Number</label>
            </div>
            <span id="aadharError" class="text-danger small d-none"
              >Aadhar must be 12 digits</span
            >
          </div>
        </div>

        <!-- Password -->
        <div class="row g-2">
          <div class="col-md-6">
            <div class="form-floating">
              <input
                type="password"
                id="password"
                class="form-control"
                placeholder="Password"
              />
              <label>Password</label>
            </div>
            <span id="passwordError" class="text-danger small d-none"
              >Invalid Password</span
            >
          </div>

          <div class="col-md-6">
            <div class="form-floating">
              <input
                type="password"
                id="confirmPassword"
                class="form-control"
                placeholder="Confirm Password"
              />
              <label>Confirm Password</label>
            </div>
            <span id="confirmPasswordError" class="text-danger small d-none"
              >Passwords do not match</span
            >
          </div>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn btn-primary mt-2">Submit</button>
      </form>
    </div>
  </div>

  <div class="table-responsive w-100">
    <table class="table table-dark table-striped table-hover align-middle">
      <thead class="table-secondary text-dark">
        <tr>
          <th>#</th>
          <th>First Name</th>
          <th>Last Name</th>
          <th>Email</th>
          <th>Phone</th>
          <th>PAN</th>
          <th>License</th>
          <th>Aadhar</th>
          <th>Delete</th>
        </tr>
      </thead>

      <tbody id="driversTable"></tbody>
    </table>
  </div>
</div>
