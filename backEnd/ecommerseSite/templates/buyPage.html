<div class="container p-2 shadow-sm">
  <h2 class="mb-4">Order Summary</h2>

  <!-- Add Address Modal -->
  <div
    class="modal fade"
    id="addressModal"
    tabindex="-1"
    aria-labelledby="addressModalLabel"
    aria-hidden="true"
  >
    <div class="modal-dialog">
      <div class="modal-content">
        <!-- Header -->
        <div class="modal-header">
          <h5 class="modal-title fw-bold" id="addressModalLabel">
            Add Address
          </h5>
          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="modal"
            aria-label="Close"
          ></button>
        </div>

        <!-- Body -->
        <div class="modal-body">
          <form id="addressForm">
            <div class="mb-3">
              <label class="form-label">Address Line</label>
              <input type="text" class="form-control" name="address" required />
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">City</label>
                <input type="text" class="form-control" name="city" required />
              </div>

              <div class="col-md-6 mb-3">
                <label class="form-label">State</label>
                <input type="text" class="form-control" name="state" required />
              </div>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Pincode</label>
                <input
                  type="text"
                  class="form-control"
                  maxlength="6"
                  name="pincode"
                  required
                />
              </div>

              <div class="col-md-6 mb-3">
                <label class="form-label">Country</label>
                <input
                  type="text"
                  class="form-control"
                  name="country"
                  required
                />
              </div>
            </div>
          </form>
        </div>

        <!-- Footer -->
        <div class="modal-footer">
          <button
            type="button"
            class="btn btn-secondary"
            data-bs-dismiss="modal"
          >
            Cancel
          </button>
          <button type="submit" form="addressForm" class="btn btn-dark">
            Save Address
          </button>
        </div>
      </div>
    </div>
  </div>
  <!-- Payments Modal -->
  <div
    class="modal fade"
    id="paymentsModal"
    tabindex="-1"
    aria-labelledby="paymentModalLabel"
    aria-hidden="true"
  >
    <div class="modal-dialog">
      <div class="modal-content">
        <!-- Header -->
        <div class="modal-header">
          <h5 class="modal-title fw-bold" id="paymentModalLabel">Payments</h5>
          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="modal"
            aria-label="Close"
          ></button>
        </div>

        <!-- Body -->
        <div class="modal-body">
          <form id="paymentForm">
            <!-- Payment Method -->
            <div class="mb-3">
              <label class="form-label fw-bold">Select Payment Method</label>
              <div class="form-check">
                <input
                  class="form-check-input"
                  id="payment-type-cod"
                  type="radio"
                  name="payment_method"
                  value="cod"
                  checked
                />
                <label class="form-check-label" for="payment-type-cod"
                  >Cash on Delivery (COD)</label
                >
              </div>
              <div class="form-check">
                <input
                  class="form-check-input"
                  id="payment-type-upi"
                  type="radio"
                  name="payment_method"
                  value="upi"
                />
                <label class="form-check-label" for="payment-type-upi"
                  >UPI</label
                >
              </div>
              <div class="form-check">
                <input
                  class="form-check-input"
                  id="payment-type-card"
                  type="radio"
                  name="payment_method"
                  value="card"
                />
                <label class="form-check-label" for="payment-type-card"
                  >Credit / Debit Card</label
                >
              </div>
            </div>
            <div id="upiSection" class="d-none">
              <div class="mb-3">
                <label class="form-label">UPI ID</label>
                <input
                  type="text"
                  class="form-control"
                  name="upi_id"
                  placeholder="example@upi"
                />
              </div>
            </div>
            <div id="cardSection" class="d-none">
              <div class="mb-3">
                <label class="form-label">Card Number</label>
                <input
                  type="text"
                  class="form-control"
                  name="card_number"
                  maxlength="16"
                />
              </div>

              <div class="row">
                <div class="col-md-6 mb-3">
                  <label class="form-label">Expiry Date</label>
                  <input
                    type="text"
                    class="form-control"
                    name="expiry"
                    placeholder="MM/YY"
                  />
                </div>

                <div class="col-md-6 mb-3">
                  <label class="form-label">CVV</label>
                  <input
                    type="password"
                    class="form-control"
                    name="cvv"
                    maxlength="3"
                  />
                </div>
              </div>
            </div>
          </form>
        </div>

        <!-- Footer -->
        <div class="modal-footer">
          <button
            type="button"
            class="btn btn-secondary"
            data-bs-dismiss="modal"
          >
            Cancel
          </button>
          <button type="submit" form="paymentForm" class="btn btn-success">
            Confirm Payment
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Cart Header -->
  <div class="row fw-bold border-bottom pb-2">
    <div class="col-4">Product</div>
    <div class="col-2 text-center">Price</div>
    <div class="col-2 text-center">Qty</div>
    <div class="col-4 text-end">Total</div>
  </div>

  <!-- Cart Items -->
  <div id="cartItems" class="mt-2"></div>

  <!-- Address -->
  <div class="my-4">
    <div class="d-flex justify-content-between align-content-center">
      <div class="fs-5 fw-bold mb-3">Select Delivery Address</div>
      <div class="">
        <button
          class="btn btn-dark"
          data-bs-toggle="modal"
          data-bs-target="#addressModal"
        >
          + Add new address
        </button>
      </div>
    </div>

    <div id="addressList" class="d-flex flex-column gap-3"></div>
  </div>

  <input type="text" name="product_id" id="productId" hidden />
  
  <!-- Total -->
  <div class="text-end mt-4">
    <h4>Total: ₹. <span id="totalPrice">0</span></h4>
    <button
      class="btn btn-success checkout-btn mt-2 px-4"
      data-bs-toggle="modal"
      data-bs-target="#paymentsModal"
      id="confirmBuyBtn"
    >
      Place Order
    </button>
  </div>
</div>
